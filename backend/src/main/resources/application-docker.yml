# AI Bookkeeping - Docker Profile
# Docker 容器内网络环境配置

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ai_bookkeeping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:root123}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.3

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mySecretKeyForAIBookkeepingSystem2024MustBeLongEnough}

logging:
  level:
    com.aibookkeeping: info
    org.springframework.ai: warn
